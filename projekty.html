<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DINOUSEG · Projects</title>

    <!-- FAVICON — modrá kulička s glow -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <meta name="theme-color" content="#2f8aff" />

    <!-- FONTY -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Unbounded:wght@400;600;800;900&family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- POZADÍ -->
    <div class="bg-base"></div>
    <div class="lava">
      <div class="bubble b1"></div>
      <div class="bubble b2"></div>
      <div class="bubble b3"></div>
      <div class="bubble b4"></div>
      <div class="bubble b5"></div>
      <div class="bubble b6"></div>
      <div class="bubble b7"></div>
      <div class="bubble b8"></div>
      <div class="bubble b9"></div>
      <div class="bubble b10"></div>
    </div>
    <canvas id="stars"></canvas>

    <div class="scroll-progress" id="scrollProg"></div>

    <!-- NAVIGACE -->
    <nav class="top">
      <a href="index.html"><span>Main</span></a>
      <a href="stats.html"><span>Stats</span></a>
      <a href="projekty.html"><span>Projects</span></a>
      <a href="web.html"><span>Webs</span></a>
    </nav>

    <!-- ============================================================
     PODSEKCE: PROJEKTY — DinBot, Deconomy…
     Vykresluje renderProjects() z DATA.projects
     ============================================================ -->
    <div class="section-divider">
      <h2 class="page-title">Projects</h2>
      <p class="page-desc">Things I work on and the community I build.</p>
    </div>

    <section class="page" id="projekty">
      <div class="projects-grid" id="projectsGrid"><!-- karty projektů --></div>
    </section>

    <!-- ============================================================
     PODSEKCE: GAMING HUB — velký banner s odkazem na Discord
     Vyplní renderHub() z DATA.hub
     ============================================================ -->
    <div class="section-divider">
      <h2 class="page-title">HUB</h2>
      <p class="page-desc">
        My closed gaming community. Click on the image to join.
      </p>
    </div>

    <section class="page" id="hub">
      <div class="hub-card reveal">
        <a
          href="#"
          id="hubLink"
          class="hub-image-wrap"
          target="_blank"
          rel="noopener"
        >
          <div class="placeholder-big">GAMING HUB</div>
          <img id="hubImg" src="" alt="" style="display: none" />
          <div class="overlay">
            <div class="cta">Join server →</div>
          </div>
        </a>
        <div class="hub-tagline">Closed Community · By invitation</div>
        <h2 class="hub-title">Gaming HUB</h2>
        <div class="hub-badge">★ Private Server</div>
        <p class="hub-desc" id="hubDesc"><!-- vyplní renderHub() --></p>
      </div>
    </section>

    <!-- FOOTER -->
    <footer>
      <div class="signature">DINOUSEG</div>
      <div class="copy">© <span id="year"></span> · Made with passion</div>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
      // Vykreslit projekty + hub
      renderProjects('#projectsGrid');
      renderHub();
    </script>
  </body>
</html>
