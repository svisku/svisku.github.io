<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>DINOUSEG · Arcade</title>
    <meta
      name="description"
      content="Games Dinouseg plays and the music he listens to."
    />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <meta name="theme-color" content="#07080c" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Chakra+Petch:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css?v=25" />
  </head>
  <body>
    <div class="bg-base"></div>
    <canvas id="shader"></canvas>
    <div class="bg-noise"></div>

    <div class="scroll-progress" id="scrollProg"></div>

    <div class="lang-toggle" id="langToggle" role="group" aria-label="Language">
      <button type="button" data-lang="en">EN</button>
      <button type="button" data-lang="cs">CZ</button>
    </div>

    <nav class="top">
      <a href="index.html"><span data-i18n="nav.home"></span></a>
      <a href="stats.html"><span data-i18n="nav.arcade"></span></a>
      <a href="setup.html"><span data-i18n="nav.setup"></span></a>
      <a href="web.html"><span data-i18n="nav.webs"></span></a>
    </nav>

    <div class="section-divider reveal" style="padding-top: 110px">
      <h2 class="page-title" data-i18n="games.title"></h2>
      <p class="page-desc" data-i18n="games.desc"></p>
    </div>

    <section class="page" id="hry">
      <div class="podium-wrap" id="podiumWrap">
        <div class="skel-grid" style="grid-template-columns: repeat(3, 1fr)">
          <div class="skeleton" style="height: 170px"></div>
          <div class="skeleton" style="height: 210px"></div>
          <div class="skeleton" style="height: 140px"></div>
        </div>
      </div>
    </section>

    <div class="section-divider reveal">
      <h2 class="page-title" data-i18n="music.title"></h2>
      <p class="page-desc" data-i18n="music.desc"></p>
    </div>

    <section class="page" id="hudba">
      <div class="music-grid" id="musicGrid">
        <div class="skel-grid">
          <div class="skeleton skel-card"></div>
          <div class="skeleton skel-card"></div>
        </div>
      </div>
    </section>

    <footer class="reveal">
      <div class="signature">DINOUSEG</div>
      <div class="copy">
        © <span id="year"></span> <span data-i18n="footer.rights"></span>
      </div>
      <div class="copy-fine" data-i18n="footer.fine"></div>
    </footer>

    <script src="data.js?v=25"></script>
    <script src="app.js?v=25"></script>
    <script>
      window.__dino.registerPage(function () {
        renderGames('#podiumWrap');
        renderMusic('#musicGrid');
      });
    </script>
  </body>
</html>
