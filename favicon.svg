<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- hlavní gradient kuličky — světle modrá nahoře vlevo → tmavě modrá dole -->
    <radialGradient id="ball" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#9ed1ff"/>
      <stop offset="40%" stop-color="#4fc3ff"/>
      <stop offset="80%" stop-color="#2f8aff"/>
      <stop offset="100%" stop-color="#1a4f9e"/>
    </radialGradient>
    <!-- halo glow kolem kuličky -->
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#4fc3ff" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#2f8aff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#2f8aff" stop-opacity="0"/>
    </radialGradient>
    <!-- lesk -->
    <radialGradient id="shine" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- glow halo (rozmazaná aura kolem kuličky) -->
  <circle cx="32" cy="32" r="30" fill="url(#halo)"/>

  <!-- hlavní kulička -->
  <circle cx="32" cy="32" r="22" fill="url(#ball)"/>

  <!-- jemný okraj -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#7fb8ff" stroke-opacity="0.35" stroke-width="0.5"/>

  <!-- lesk vlevo nahoře -->
  <ellipse cx="24" cy="22" rx="8" ry="6" fill="url(#shine)"/>
</svg>
